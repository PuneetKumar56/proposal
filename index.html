<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do You Love Me?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h3>I don’t know about forever… <br>but I know I want you in every moment of my life 💕</h3>
  <p>I like you… <br>and it’s something my heart says very honestly ❤️</p>
  <h1 id="title">Do you love me ❤️?</h1>

  <!-- Optional cute image -->
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" class="gif">

  <div class="btn-group">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 😢</button>
  </div>

  <p id="message"></p>
</div>

<div class="hearts"></div>
<canvas id="confetti"></canvas>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
